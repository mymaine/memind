name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm -r typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: memind
          POSTGRES_PASSWORD: memind
          POSTGRES_DB: memind
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U memind -d memind"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Both names point at the same service container — the server reads
      # TEST_DATABASE_URL when NODE_ENV=test, DATABASE_URL otherwise. We set
      # both so either entry point works without touching CI wiring later.
      DATABASE_URL: postgres://memind:memind@localhost:5432/memind
      TEST_DATABASE_URL: postgres://memind:memind@localhost:5432/memind
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
